<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>鋼構刷題系統 PRO</title>
<style>
:root {
  --bg1:#dbeafe; --bg2:#f8fafc; --card:#ffffff; --line:#e5e7eb;
  --text:#111827; --muted:#6b7280; --primary:#2563eb; --primary2:#1d4ed8;
  --danger:#dc2626; --dangerBg:#fef2f2; --success:#059669; --successBg:#ecfdf5;
  --warning:#d97706; --shadow:0 12px 32px rgba(15,23,42,.12);
}
* { box-sizing:border-box; }
body {
  margin:0; padding:24px; font-family:"Microsoft JhengHei", Arial, sans-serif;
  color:var(--text);
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
}
.wrap {
  max-width:980px; margin:0 auto; background:rgba(255,255,255,.92);
  backdrop-filter: blur(6px);
  border:1px solid rgba(255,255,255,.65);
  border-radius:22px; padding:24px; box-shadow:var(--shadow);
}
h1 { margin:0 0 8px; font-size:32px; }
.sub { color:var(--muted); margin-bottom:18px; }
.toolbar {
  display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:18px;
}
.modebox {
  display:flex; flex-wrap:wrap; gap:12px; align-items:center; padding:10px 12px;
  border:1px solid var(--line); border-radius:14px; background:#fff;
}
.modebox label { cursor:pointer; }
button {
  border:none; border-radius:12px; padding:11px 16px; font-size:15px; cursor:pointer;
  color:#fff; background:linear-gradient(135deg,var(--primary),var(--primary2));
  box-shadow:0 8px 20px rgba(37,99,235,.22);
}
button.secondary {
  background:linear-gradient(135deg,#475569,#334155);
  box-shadow:0 8px 20px rgba(51,65,85,.18);
}
button.danger {
  background:linear-gradient(135deg,#ef4444,#dc2626);
  box-shadow:0 8px 20px rgba(220,38,38,.18);
}
button:disabled { opacity:.6; cursor:not-allowed; }
.topstats {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px; margin:18px 0;
}
.stat {
  background:#fff; border:1px solid var(--line); border-radius:16px; padding:14px;
}
.stat .label { color:var(--muted); font-size:13px; }
.stat .value { font-size:28px; font-weight:800; margin-top:4px; }
.fail-banner {
  margin:14px 0 6px; padding:18px; text-align:center; border-radius:18px;
  background:linear-gradient(135deg,#fee2e2,#fecaca); color:var(--danger);
  font-size:42px; font-weight:900; letter-spacing:2px;
}
.pass-banner {
  margin:14px 0 6px; padding:14px; text-align:center; border-radius:18px;
  background:linear-gradient(135deg,#dcfce7,#bbf7d0); color:var(--success);
  font-size:26px; font-weight:800;
}
.question-card {
  background:var(--card); border:1px solid var(--line); border-radius:18px;
  padding:16px; margin:12px 0;
}
.q-meta {
  display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; color:var(--muted); font-size:12px;
}
.q-title { font-size:19px; font-weight:700; line-height:1.55; margin-bottom:10px; }
.options {
  display:grid; gap:8px;
}
.option {
  border:1px solid var(--line); border-radius:12px; padding:10px 12px; background:#fff;
}
.option:hover { background:#f8fafc; }
.option input { margin-right:8px; }
.section-title {
  margin:18px 0 8px; font-size:22px; font-weight:800;
}
.note {
  color:var(--muted); font-size:14px; margin:8px 0 0;
}
.wrong-item {
  border:1px solid #fecaca; background:var(--dangerBg); border-radius:16px; padding:14px; margin:10px 0;
}
.correct-answer { color:var(--danger); font-weight:800; }
.good { color:var(--success); font-weight:800; }
.stats-table {
  width:100%; border-collapse:collapse; margin-top:10px; background:#fff; border-radius:14px; overflow:hidden;
}
.stats-table th, .stats-table td {
  border-bottom:1px solid var(--line); padding:10px 12px; text-align:left;
}
.stats-table th { background:#f8fafc; }
.pill {
  display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700;
  background:#eef2ff; color:#3730a3;
}
.hidden { display:none; }
.footer-gap { height:8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>鋼構刷題系統 PRO</h1>
  <div class="sub">25 題一回，每題 4 分，滿分 100。支援錯題重測、答對 3 次移除、章節錯誤率統計、不及格語音提醒。</div>

  <div class="toolbar">
    <div class="modebox">
      <span class="pill">題庫模式</span>
      <label><input type="radio" name="mode" value="concept" checked> 觀念題 100 題</label>
      <label><input type="radio" name="mode" value="numeric"> 數值題 50 題</label>
      <label><input type="radio" name="mode" value="mixed"> 混合題庫 150 題</label>
    </div>
    <button onclick="startQuiz()">開始測驗</button>
    <button class="secondary" onclick="startWrongQuiz()">錯題重測</button>
    <button class="secondary" onclick="showStats()">章節錯誤率</button>
    <button class="danger" onclick="clearProgress()">清除錯題記錄</button>
  </div>

  <div id="topstats" class="topstats hidden"></div>
  <div id="banner"></div>
  <div id="quiz"></div>
  <div id="actionBar" class="hidden">
    <button onclick="submitQuiz()">交卷評分</button>
  </div>
  <div id="result"></div>
  <div class="footer-gap"></div>
</div>

const STORAGE_KEY = "steelQuizRecordsV1";
let currentQuestions = [];
let currentMode = "concept";
let currentSource = "normal"; // normal / wrong
let submitted = false;

function getRecords() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  } catch(e) {
    return {};
  }
}

function setRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getMode() {
  const selected = document.querySelector('input[name="mode"]:checked');
  return selected ? selected.value : "concept";
}

function getPoolByMode(mode) {
  if (mode === "concept") return bank.filter(q => q.section === "觀念題");
  if (mode === "numeric") return bank.filter(q => q.section === "數值題");
  return bank;
}

function renderTopStats(extra={}) {
  const records = getRecords();
  const keys = Object.keys(records);
  let wrongPoolCount = 0;
  let attemptCount = 0;
  let wrongCount = 0;
  keys.forEach(k => {
    const r = records[k];
    attemptCount += r.attempts || 0;
    wrongCount += r.wrong || 0;
    if ((r.wrong || 0) > 0 && (r.mastery || 0) < 3) wrongPoolCount += 1;
  });
  const html = `
    <div class="stat"><div class="label">目前模式</div><div class="value">${extra.modeLabel || "-"}</div></div>
    <div class="stat"><div class="label">本回題數</div><div class="value">${extra.quizCount || 0}</div></div>
    <div class="stat"><div class="label">未熟錯題</div><div class="value">${wrongPoolCount}</div></div>
    <div class="stat"><div class="label">累計作答</div><div class="value">${attemptCount}</div></div>
    <div class="stat"><div class="label">累計答錯</div><div class="value">${wrongCount}</div></div>
  `;
  const box = document.getElementById("topstats");
  box.innerHTML = html;
  box.classList.remove("hidden");
}

function renderQuiz(questions) {
  submitted = false;
  currentQuestions = questions;
  document.getElementById("banner").innerHTML = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("quiz").innerHTML = questions.map((item, idx) => `
    <div class="question-card">
      <div class="q-meta">
        <span class="pill">${item.section}</span>
        <span class="pill">${item.chapter}</span>
        <span class="pill">原題號 #${item.source_no}</span>
      </div>
      <div class="q-title">${idx + 1}. ${item.q}</div>
      <div class="options">
        <label class="option"><input type="radio" name="q${idx}" value="A"> (A) ${item.options.A}</label>
        <label class="option"><input type="radio" name="q${idx}" value="B"> (B) ${item.options.B}</label>
        <label class="option"><input type="radio" name="q${idx}" value="C"> (C) ${item.options.C}</label>
        <label class="option"><input type="radio" name="q${idx}" value="D"> (D) ${item.options.D}</label>
      </div>
    </div>
  `).join("");
  document.getElementById("actionBar").classList.remove("hidden");
}

function startQuiz() {
  currentMode = getMode();
  currentSource = "normal";
  const pool = getPoolByMode(currentMode);
  const picked = shuffleArray(pool).slice(0, Math.min(25, pool.length));
  renderTopStats({modeLabel: currentMode === "concept" ? "觀念題" : currentMode === "numeric" ? "數值題" : "混合題庫", quizCount: picked.length});
  renderQuiz(picked);
}

function startWrongQuiz() {
  const records = getRecords();
  const wrongIds = new Set(Object.keys(records).filter(id => (records[id].wrong || 0) > 0 && (records[id].mastery || 0) < 3));
  let pool = bank.filter(q => wrongIds.has(q.id));

  const selectedMode = getMode();
  if (selectedMode === "concept") pool = pool.filter(q => q.section === "觀念題");
  else if (selectedMode === "numeric") pool = pool.filter(q => q.section === "數值題");

  if (pool.length === 0) {
    alert("目前沒有未熟錯題。");
    return;
  }
  currentMode = selectedMode;
  currentSource = "wrong";
  const picked = shuffleArray(pool).slice(0, Math.min(25, pool.length));
  renderTopStats({modeLabel: "錯題重測", quizCount: picked.length});
  renderQuiz(picked);
}

function speakEncourage() {
  try {
    if ("speechSynthesis" in window) {
      const utter = new SpeechSynthesisUtterance("你要加油");
      utter.lang = "zh-TW";
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
    }
  } catch (e) {}
}

function submitQuiz() {
  if (submitted || currentQuestions.length === 0) return;
  submitted = true;

  const records = getRecords();
  let correctCount = 0;
  let wrongCountThisQuiz = 0;
  let wrongHtml = "";

  currentQuestions.forEach((item, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const userAns = selected ? selected.value : "未作答";

    if (!records[item.id]) {
      records[item.id] = {
        id: item.id,
        section: item.section,
        chapter: item.chapter,
        source_no: item.source_no,
        attempts: 0,
        wrong: 0,
        correct: 0,
        mastery: 0
      };
    }

    const rec = records[item.id];
    rec.attempts += 1;

    if (userAns === item.answer) {
      correctCount += 1;
      rec.correct += 1;
      if (rec.wrong > 0) {
        rec.mastery += 1;
      }
    } else {
      wrongCountThisQuiz += 1;
      rec.wrong += 1;
      rec.mastery = 0; // 答錯就重新累積熟練度
      wrongHtml += `
        <div class="wrong-item">
          <div><strong>第 ${idx + 1} 題（原題號 #${item.source_no}）</strong></div>
          <div>${item.q}</div>
          <div>你的答案：${userAns}</div>
          <div class="correct-answer">正確答案：(${item.answer}) ${item.options[item.answer]}</div>
        </div>
      `;
    }
  });

  setRecords(records);

  const score = correctCount * 4;
  const accuracy = ((correctCount / currentQuestions.length) * 100).toFixed(0);
  const pass = score >= 60;

  let bannerHtml = "";
  if (!pass) {
    bannerHtml = `<div class="fail-banner">你要加油！</div>`;
    speakEncourage();
  } else {
    bannerHtml = `<div class="pass-banner">通過 👍</div>`;
  }
  document.getElementById("banner").innerHTML = bannerHtml;

  document.getElementById("result").innerHTML = `
    <div class="topstats">
      <div class="stat"><div class="label">分數</div><div class="value">${score} / 100</div></div>
      <div class="stat"><div class="label">答對</div><div class="value">${correctCount} 題</div></div>
      <div class="stat"><div class="label">答錯</div><div class="value">${wrongCountThisQuiz} 題</div></div>
      <div class="stat"><div class="label">正確率</div><div class="value">${accuracy}%</div></div>
    </div>
    <div class="section-title">錯題與正確答案</div>
    ${wrongHtml || '<div class="question-card"><span class="good">恭喜，全對！</span></div>'}
    <div class="note">錯題重測只會出「曾經答錯，且尚未連續答對滿 3 次」的題目。</div>
  `;
}

function clearProgress() {
  if (!confirm("確定要清除所有錯題記錄與熟練度嗎？")) return;
  localStorage.removeItem(STORAGE_KEY);
  alert("已清除錯題記錄。");
  renderTopStats({modeLabel:"已清除", quizCount:0});
  document.getElementById("banner").innerHTML = "";
  document.getElementById("result").innerHTML = "";
}

function showStats() {
  const records = getRecords();
  const byChapter = {};

  Object.values(records).forEach(rec => {
    const key = `${rec.section}｜${rec.chapter}`;
    if (!byChapter[key]) {
      byChapter[key] = {
        section: rec.section,
        chapter: rec.chapter,
        attempts: 0,
        wrong: 0,
        correct: 0,
        unmastered: 0
      };
    }
    byChapter[key].attempts += rec.attempts || 0;
    byChapter[key].wrong += rec.wrong || 0;
    byChapter[key].correct += rec.correct || 0;
    if ((rec.wrong || 0) > 0 && (rec.mastery || 0) < 3) byChapter[key].unmastered += 1;
  });

  const rows = Object.values(byChapter)
    .sort((a,b) => {
      const ra = a.attempts ? a.wrong / a.attempts : 0;
      const rb = b.attempts ? b.wrong / b.attempts : 0;
      return rb - ra;
    })
    .map(r => {
      const rate = r.attempts ? ((r.wrong / r.attempts) * 100).toFixed(1) : "0.0";
      return `
        <tr>
          <td>${r.section}</td>
          <td>${r.chapter}</td>
          <td>${r.attempts}</td>
          <td>${r.wrong}</td>
          <td>${rate}%</td>
          <td>${r.unmastered}</td>
        </tr>
      `;
    }).join("");

  renderTopStats({modeLabel:"章節錯誤率", quizCount: currentQuestions.length || 0});
  document.getElementById("banner").innerHTML = "";
  document.getElementById("quiz").innerHTML = "";
  document.getElementById("actionBar").classList.add("hidden");
  document.getElementById("result").innerHTML = `
    <div class="section-title">章節錯誤率統計</div>
    <table class="stats-table">
      <thead>
        <tr>
          <th>題型</th>
          <th>章節</th>
          <th>作答次數</th>
          <th>答錯次數</th>
          <th>錯誤率</th>
          <th>未熟題數</th>
        </tr>
      </thead>
      <tbody>
        ${rows || '<tr><td colspan="6">目前尚無作答紀錄。</td></tr>'}
      </tbody>
    </table>
    <div class="note">未熟題數＝曾經答錯，且目前尚未連續答對滿 3 次的題目數。</div>
  `;
}

renderTopStats({modeLabel:"待開始", quizCount:0});
</script>
</body>
</html>
